version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: ../docker/Dockerfile.server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    restart: unless-stopped
    networks:
      - fleetpulse

  client:
    build:
      context: ./client
      dockerfile: ../docker/Dockerfile.client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - fleetpulse

networks:
  fleetpulse:
    driver: bridge
